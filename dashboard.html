<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognivex Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Supabase + Auth scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Authenticate user before loading dashboard features
        document.addEventListener('DOMContentLoaded', () => {
            const waitForAuth = setInterval(async () => {
                if (window.supabaseClient && window.authHandler) {
                    clearInterval(waitForAuth);

                    const supabase = window.supabaseClient;

                    try {
                        const { data, error } = await supabase.auth.getSession();
                        if (error) throw error;

                        if (!data.session) {
                            console.log('No active session. Redirecting to login.');
                            window.location.href = 'index.html';
                            return;
                        }

                        console.log('Authenticated session detected.');

                        // Load behavioral monitoring after auth
                        const behaviorScript = document.createElement('script');
                        behaviorScript.src = 'js/behavior.js';
                        document.body.appendChild(behaviorScript);

                    } catch (err) {
                        console.error('Dashboard auth error:', err);
                        window.location.href = 'index.html';
                    }
                }
            }, 100);
        });
    </script>
</head>

<body class="dashboard-page">
<header class="header">
    <div class="logo">Cognivex</div>

    <div class="status-indicator">
        <span class="status-dot"></span>
        <span>Session Active – Behavioral Monitoring Enabled</span>
    </div>

    <button class="btn btn-text" id="logoutBtn">Sign Out</button>

</header>

<main class="dashboard-main">

    <!-- INPUT SECTION -->
    <section class="input-section">
        <div class="section-container">
            <h2>Research Notes</h2>
            <p class="section-subtitle">Enter your research notes or observations below</p>

            <textarea
                id="researchNotes"
                class="text-input"
                placeholder="Type your research notes, findings, or observations here..."
                rows="10"
            ></textarea>

            <div class="button-group">
                <button id="saveTextBtn" class="btn btn-primary">Save Notes</button>
                <button id="clearTextBtn" class="btn btn-secondary">Clear</button>
            </div>

            <div id="feedback-message" class="feedback-message"></div>
        </div>
    </section>

    <!-- CONTENT SECTION - FLOWS DIRECTLY WITHOUT BOX -->
    <section class="content-display-section">
        <div class="section-container">
            <h2>Research Library</h2>
            <p class="section-subtitle">Comprehensive collection of research materials and insights</p>

            <div id="researchContent" class="content-flow">
                <!-- Content will be dynamically loaded here -->
            </div>
        </div>
    </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const content = document.getElementById('researchContent');
    const researchNotes = document.getElementById('researchNotes');
    const saveTextBtn = document.getElementById('saveTextBtn');
    const clearTextBtn = document.getElementById('clearTextBtn');
    const feedbackMessage = document.getElementById('feedback-message');

    const paragraphs = [
        "Zero Trust Architecture enforces strict identity verification.",
    "Behavioral biometrics provides continuous authentication.",
    "ZTNA reduces lateral movement risks.",
    "Keystroke and mouse dynamics enhance security.",
    "Anomaly detection identifies unauthorized access.",
    "Continuous monitoring ensures real-time threat detection.",
    "Multi-factor authentication strengthens login security.",
    "Access is granted on a least-privilege basis.",
    "Dynamic policy enforcement adapts to user behavior.",
    "Device posture checks prevent compromised devices from connecting.",
    "Session analysis detects suspicious activity patterns.",
    "Risk-based authentication improves overall security posture.",
    "Adaptive access control mitigates insider threats.",
    "Behavioral patterns help in early attack detection.",
    "Granular segmentation limits unauthorized lateral movement.",
    "Context-aware policies enforce location and time restrictions.",
    "Audit logs provide traceability for security incidents.",
    "Automated alerts notify admins of policy violations.",
    "Continuous verification replaces static perimeter defenses.",
    "Keystroke rhythms and mouse gestures strengthen user identity.",
    "Real-time anomaly detection prevents account takeovers.",
    "Zero Trust ensures no implicit trust is given to devices or users.",
    "Behavioral biometrics reduces the need for frequent passwords.",
    "ZTNA ensures secure remote access without VPN risks.",
    "Machine learning models analyze user behavior for threats.",
    "Granular control over resources enhances overall security.",
    "Continuous authentication protects sensitive applications.",
    "Unauthorized access attempts are immediately flagged.",
    "Adaptive security policies evolve with emerging threats.",
    "Behavioral insights improve both usability and security."
    ];

    // Dynamically add all paragraphs to content
    paragraphs.forEach((text, index) => {
        const p = document.createElement('p');
        p.textContent = text;
        p.className = 'content-paragraph';
        content.appendChild(p);
    });

    // Save Notes button
    saveTextBtn.addEventListener('click', () => {
        const text = researchNotes.value.trim();
        if (text) {
            feedbackMessage.textContent = '✓ Notes saved successfully!';
            feedbackMessage.classList.add('visible', 'success');
            setTimeout(() => {
                feedbackMessage.classList.remove('visible');
            }, 3000);
        } else {
            feedbackMessage.textContent = '⚠ Please enter some notes before saving.';
            feedbackMessage.classList.add('visible', 'warning');
            setTimeout(() => {
                feedbackMessage.classList.remove('visible');
            }, 3000);
        }
    });

    // Clear button
    clearTextBtn.addEventListener('click', () => {
        if (researchNotes.value) {
            if (confirm('Are you sure you want to clear all notes?')) {
                researchNotes.value = '';
                feedbackMessage.textContent = 'Notes cleared.';
                feedbackMessage.classList.add('visible', 'info');
                setTimeout(() => {
                    feedbackMessage.classList.remove('visible');
                }, 2000);
            }
        }
    });
});
</script>

<script>
  const logoutBtn = document.getElementById("logoutBtn");

  if (logoutBtn) {
    logoutBtn.addEventListener("click", async () => {
      // Disable the button immediately to prevent double-clicks
      logoutBtn.disabled = true;
      logoutBtn.textContent = "Signing out...";

      try {
        console.log("Logout initiated, sending session-end...");

        // Wait for behavior.js to load (up to 5s)
        let attempts = 0;
        while (!window.sendSessionEnd && attempts < 50) {
          await new Promise(resolve => setTimeout(resolve, 100));
          attempts++;
        }

        // Send session-end and WAIT for it to complete before logging out
        if (typeof window.sendSessionEnd === "function") {
          var result = await window.sendSessionEnd();
          console.log("Session-end completed:", result);
        } else {
          console.warn("sendSessionEnd function not available");
        }

      } catch (err) {
        console.error("Error during session-end:", err);
      }

      // Only now do the actual Supabase logout + redirect
      try {
        if (window.authHandler) {
          await window.authHandler.logout();
        }
      } catch (err) {
        console.error("Auth logout error:", err);
      }
      // Fallback redirect in case authHandler.logout doesn't redirect
      window.location.href = 'index.html';
    });
  }
</script>

</body>
</html>
